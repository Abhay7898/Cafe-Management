<div class="row g-0">
    <div class="col-md-6">
        <div class="video">
            <button type="button" class="btn-play" data-bs-toggle="modal"
                data-src="https://www.youtube.com/watch?v=7qFClwGaFYc" data-bs-target="#videoModal">
                <span></span>
            </button>
        </div>
    </div>
    <div class="col-md-6 bg-dark d-flex align-items-center">
        <div class="p-5 wow fadeInUp" data-wow-delay="0.2s">
            <h5 class="section-title ff-secondary text-start text-primary fw-normal">Welcome</h5>
            <h1 class="text-white mb-4">Login</h1>
            <form (ngSubmit)="onSubmit()">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-floating form-group">
                            <input type="text" class="form-control" [(ngModel)]="login.userName" id="userName"
                                placeholder="Your userName" [ngModelOptions]="{standalone: true}">
                            <label for="userName">Your userName</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-floating form-group">
                            <input type="password" class="form-control" [(ngModel)]="login.password" id="password"
                                placeholder="Your Password" [ngModelOptions]="{standalone: true}">
                            <label for="password">Password</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <button class="btn btn-primary w-100 py-3" type="submit">Submit</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
